name: Build OpenWrt Firmware

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      branch:
        description: '选择编译分支'
        required: true
        default: 'openwrt-25.12'
        type: choice
        options:
          - openwrt-25.12
          - main
      target:
        description: '选择设备架构'
        required: true
        default: 'x86-64'
        type: choice
        options:
          - x86-64
          - r3g
      ssh:
        description: '启用 SSH 远程调试'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04

    # ── Node.js 24 适配 ──────────────────────────────────────────────
    # FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 必须在 job 级 env 下才生效
    # 同时将所有 action 升级到原生支持 Node24 的版本：
    #   actions/checkout        v4 → v5   (node24)
    #   actions/upload-artifact v4 → v6   (node24)
    #   softprops/action-gh-release 保持 v2（已支持 node24）
    # ─────────────────────────────────────────────────────────────────
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      REPO_URL: https://github.com/openwrt/openwrt
      REPO_BRANCH: ${{ github.event.inputs.branch || 'openwrt-25.12' }}
      TARGET: ${{ github.event.inputs.target || 'x86-64' }}
      UPLOAD_FIRMWARE: true
      UPLOAD_RELEASE: true
      TZ: Asia/Shanghai

    permissions:
      contents: write
      actions: write
      packages: write

    steps:
    - name: 检出仓库代码
      uses: actions/checkout@v5

    - name: 校验配置文件
      run: |
        CONFIG_FILE="configs/${TARGET}/dot.config"
        FEEDS_CONF="configs/${TARGET}/feeds.conf.default"
        echo "CONFIG_FILE=${CONFIG_FILE}" >> $GITHUB_ENV
        echo "FEEDS_CONF=${FEEDS_CONF}"   >> $GITHUB_ENV
        echo "=============================="
        echo " 架构 : ${TARGET}"
        echo " 分支 : ${REPO_BRANCH}"
        echo " 配置 : ${CONFIG_FILE}"
        echo "=============================="
        if [ ! -f "${CONFIG_FILE}" ]; then
          echo "::error::找不到 ${CONFIG_FILE}"
          find configs/ | sort
          exit 1
        fi
        echo "--- 目标平台 ---"
        grep '^CONFIG_TARGET' "${CONFIG_FILE}"
        echo "----------------"

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet \
                    /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install \
          ack antlr3 asciidoc autoconf automake autopoint binutils bison \
          build-essential bzip2 ccache cmake cpio curl device-tree-compiler \
          fastjar flex gawk gettext gcc-multilib g++-multilib git gperf \
          haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
          libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
          libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip \
          p7zip-full patch pkgconf python3 python3-pyelftools \
          python3-setuptools qemu-utils rsync scons squashfs-tools \
          subversion swig texinfo uglifyjs upx-ucl unzip vim wget \
          xmlto xxd zlib1g-dev
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: 克隆源代码
      working-directory: /workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 加载自定义 Feeds + 运行 diy-part1.sh
      run: |
        if [ -f "$FEEDS_CONF" ]; then
          cp "$FEEDS_CONF" openwrt/feeds.conf.default
          echo "[✓] 已载入 $FEEDS_CONF"
        fi
        chmod +x diy-part1.sh
        cd openwrt && $GITHUB_WORKSPACE/diy-part1.sh

    - name: 更新并安装 Feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: 载入 dot.config + 运行 diy-part2.sh
      run: |
        cp "$CONFIG_FILE" openwrt/.config
        echo "--- 载入后目标平台 ---"
        grep '^CONFIG_TARGET' openwrt/.config
        echo "----------------------"
        chmod +x diy-part2.sh
        cd openwrt && $GITHUB_WORKSPACE/diy-part2.sh
        echo "--- diy-part2 执行后 ---"
        cd openwrt && grep '^CONFIG_TARGET' .config
        echo "------------------------"

    - name: SSH 远程调试
      uses: mxschmitt/action-tmate@v3
      if: github.event.inputs.ssh == 'true'

    - name: 下载软件包
      run: |
        cd openwrt
        make defconfig
        echo "--- defconfig 后目标平台 ---"
        grep '^CONFIG_TARGET' .config
        echo "----------------------------"
        make download -j8
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo "使用 $(nproc) 线程编译"
        if make -j$(nproc); then
          echo "多线程编译成功"
        else
          echo "多线程失败，切换 make -j1 V=s"
          make -j1 V=s 2>&1 | tee /tmp/build.log
        fi
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config \
          | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] \
          && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

    - name: 上传编译错误日志
      if: failure()
      uses: actions/upload-artifact@v6
      with:
        name: build-error-log
        path: /tmp/build.log
        retention-days: 3

    - name: 整理固件文件
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        echo "=== bin/targets 完整结构 ==="
        find /workdir/openwrt/bin/targets -type f 2>/dev/null | sort \
          || echo "（目录为空）"
        echo "============================="

        # 用绝对路径，避免相对路径歧义
        TARGETS_DIR=$(find /workdir/openwrt/bin/targets \
          -mindepth 2 -maxdepth 2 -type d 2>/dev/null | head -1)

        if [ -z "$TARGETS_DIR" ]; then
          echo "::error::未找到固件输出目录"
          exit 1
        fi

        echo "固件目录（绝对路径）: $TARGETS_DIR"
        rm -rf "$TARGETS_DIR/packages"

        # 只保留固件相关文件，排除 swapfile 等
        find "$TARGETS_DIR" -maxdepth 1 -type f | while read f; do
          case "$f" in
            *.bin|*.img|*.img.gz|*.vmdk|*.iso|*.gz|*.sha256sums|*.manifest|*.json)
              echo "  保留: $(basename $f)" ;;
            *)
              echo "  移除: $(basename $f)"
              rm -f "$f" ;;
          esac
        done

        # 使用绝对路径存入 GITHUB_ENV
        echo "FIRMWARE=$TARGETS_DIR" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

        echo "=== 最终固件列表 ==="
        ls -lh "$TARGETS_DIR"
        echo "===================="

    - name: 上传固件 Artifact
      uses: actions/upload-artifact@v6
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 生成 Release 说明
      id: tag
      if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
        {
          echo "## OpenWrt 固件信息"
          echo "- 编译分支: ${REPO_BRANCH}"
          echo "- 设备架构: ${TARGET}"
          echo "- 编译时间: $(TZ=UTC-8 date '+%Y-%m-%d %H:%M:%S')"
          echo "- 内核版本: 6.6"
          echo "- 管理地址: 192.168.6.1"
          echo "- 默认账户: root 无密码"
          echo ""
          echo "### 内置插件"
          echo "luci-theme-kucat / luci-app-lucky"
          echo "luci-app-partexp / OpenAppFilter / AdGuardHome"
          echo "OpenClash / luci-app-netdata"
        } > release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 发布 Release
      uses: softprops/action-gh-release@v2
      if: steps.tag.outputs.status == 'success' && !cancelled()
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        body_path: release.txt
        files: |
          ${{ env.FIRMWARE }}/*.bin
          ${{ env.FIRMWARE }}/*.img
          ${{ env.FIRMWARE }}/*.img.gz
          ${{ env.FIRMWARE }}/*.vmdk
          ${{ env.FIRMWARE }}/*.gz
          ${{ env.FIRMWARE }}/*.sha256sums
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: 删除旧 Workflow 记录
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 3

    - name: 删除旧 Release
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: dev-drprasad/delete-older-releases@v0.3.4
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
